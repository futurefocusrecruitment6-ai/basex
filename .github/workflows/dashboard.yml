name: Dashboard Refresh After Monitor

on:
  repository_dispatch:
    types:
      - monitor-hub-completed
  workflow_dispatch:

jobs:
  trigger-vercel-deploy:
    name: Trigger Vercel Deploy Hook
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.client_payload.conclusion == 'success' && github.event.client_payload.branch == 'main') }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel rebuild
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK" ]; then
            echo "VERCEL_DEPLOY_HOOK is not set."
            exit 1
          fi

          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK"
          echo "Triggered Vercel rebuild after successful monitor workflow run."
