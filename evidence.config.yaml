appearance:
  default: light
  switcher: true

theme:
  colorPalettes:
    default:
      light:
        - "#4f46e5"
        - "#6366f1"
        - "#818cf8"
        - "#0ea5e9"
        - "#14b8a6"
        - "#22c55e"
        - "#eab308"
        - "#f97316"
        - "#ef4444"
        - "#64748b"
      dark:
        - "#818cf8"
        - "#6366f1"
        - "#4f46e5"
        - "#38bdf8"
        - "#2dd4bf"
        - "#4ade80"
        - "#facc15"
        - "#fb923c"
        - "#f87171"
        - "#94a3b8"
  colorScales:
    default:
      light:
        - "#e0e7ff"
        - "#312e81"
      dark:
        - "#312e81"
        - "#e0e7ff"
  colors:
    primary:
      light: "#4f46e5"
      dark: "#818cf8"
    accent:
      light: "#0ea5e9"
      dark: "#38bdf8"
    base-100:
      light: "#ffffff"
      dark: "#0f172a"
    base-content:
      light: "#0f172a"
      dark: "#f1f5f9"
    info:
      light: "#0284c7"
      dark: "#38bdf8"
    positive:
      light: "#059669"
      dark: "#34d399"
    warning:
      light: "#d97706"
      dark: "#fbbf24"
    negative:
      light: "#dc2626"
      dark: "#f87171"

