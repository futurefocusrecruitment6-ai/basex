appearance:
  default: light
  switcher: true

theme:
  colorPalettes:
    default:
      light:
        - "#2563eb"
        - "#3b82f6"
        - "#60a5fa"
        - "#0ea5e9"
        - "#06b6d4"
        - "#10b981"
        - "#84cc16"
        - "#f59e0b"
        - "#ef4444"
        - "#64748b"
      dark:
        - "#60a5fa"
        - "#3b82f6"
        - "#2563eb"
        - "#38bdf8"
        - "#22d3ee"
        - "#34d399"
        - "#a3e635"
        - "#fbbf24"
        - "#f87171"
        - "#94a3b8"
  colorScales:
    default:
      light:
        - "#dbeafe"
        - "#1e3a8a"
      dark:
        - "#1e3a8a"
        - "#dbeafe"
  colors:
    primary:
      light: "#2563eb"
      dark: "#60a5fa"
    accent:
      light: "#0ea5e9"
      dark: "#38bdf8"
    base-100:
      light: "#ffffff"
      dark: "#0b1120"
    base-200:
      light: "#f8fafc"
      dark: "#111827"
    base-300:
      light: "#e2e8f0"
      dark: "#1e293b"
    base-content:
      light: "#0f172a"
      dark: "#e2e8f0"
    info:
      light: "#0284c7"
      dark: "#38bdf8"
    positive:
      light: "#059669"
      dark: "#34d399"
    warning:
      light: "#d97706"
      dark: "#fbbf24"
    negative:
      light: "#dc2626"
      dark: "#f87171"

